<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found</title>
    <meta name="robots" content="noindex" />
    <script>
      fetch('/index.html')
        .then((response) => response.text())
        .then((html) => {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(() => {
          document.body.innerHTML = '<h1>Page not found</h1><p>Please return to the <a href="/">home page</a>.</p>';
        });
    </script>
  </head>
  <body></body>
</html>
